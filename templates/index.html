<form method="POST" enctype="multipart/form-data">
    <input type="file" name="video">
    <button>Upload</button>
</form>

<h2>{{ result }}</h2>

{% if uploaded_video %}
<video width="300" controls>
    <source src="/uploads/{{ uploaded_video }}">
</video>
{% endif %}

{% if comparison_video %}
<video width="300" controls>
    <source src="/dataset/{{ comparison_video }}">
</video>
{% endif %}
