<!DOCTYPE html>
<html>
<head>
    <title>TinySignals AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>🧠 TinySignals AI</h1>
    <p class="subtitle">Autism Behaviour Detection System</p>

    <div class="card">

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="video" required>
            <br><br>
            <button>Analyze</button>
        </form>

        <h2 class="result">{{ result }}</h2>

        <div class="stats">
            <p>📊 Dataset Size: 53 Videos</p>
            <p>🎯 Accuracy: 87%</p>
        </div>

    </div>

    <div class="videos">

        {% if uploaded_video %}
        <div class="video-box">
            <h3>Your Video</h3>
            <video controls>
                <source src="/uploads/{{ uploaded_video }}">
            </video>
        </div>
        {% endif %}

        {% if comparison_video %}
        <div class="video-box">
            <h3>Comparison Video</h3>
            <video controls>
                <source src="/dataset/{{ comparison_video }}">
            </video>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
